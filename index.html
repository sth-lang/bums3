<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>마법사의 방</title>
<style>

*{box-sizing:border-box;}
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:sans-serif;
}
.hotspot{
    position:absolute;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:20;
    padding:0;
    margin:0;
}
/*
.hotspot{
    outline:3px solid red;
    background:rgba(255,0,0,0.15);
}
*/
button{
    padding:10px 18px;
    margin:6px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
    border:2px solid #8d612b;
    background:#f0c47b;
    color:#2b1607;
}
input{
    padding:10px;
    width:130px;
    font-size:20px;
    text-align:center;
    border-radius:8px;
    border:2px solid #8d612b;
}
#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}
#popupPanel{
    width:min(94vw,920px);
    max-height:94vh;
    overflow:auto;
    background:#1b120a;
    color:white;
    border:4px solid #8d612b;
    border-radius:16px;
    padding:22px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.85);
}
#popupPanel img{
    width:100%;
    max-height:72vh;
    object-fit:contain;
    border-radius:8px;
    margin-bottom:12px;
}
#dialogueWrap{
    position:absolute;
    left:50%;
    bottom:2%;
    transform:translateX(-50%);
    width:88%;
    height:20%;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:60;
    pointer-events:none;
}
#dialogueFallback{
    position:absolute;
    inset:0;
    background:rgba(20,12,5,0.9);
    border:5px double #d7a74b;
    border-radius:16px;
}
#dialogueImage{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:fill;
    z-index:1;
}
#dialogueText{
    position:relative;
    z-index:2;
    width:78%;
    text-align:center;
    font-size:clamp(18px,2vw,30px);
    font-weight:bold;
    line-height:1.45;
    word-break:keep-all;
    white-space:pre-line;
}
#dialogueText::after,
.typeText::after{
    content:"";
    display:inline-block;
    width:0.55em;
    height:1em;
    margin-left:4px;
    vertical-align:-0.12em;
    background:currentColor;
    animation:blinkCursor 0.75s steps(1) infinite;
}
#dialogueText.done::after,
.typeText.done::after{
    display:none;
}
@keyframes blinkCursor{
    50%{opacity:0;}
}
.mapWrap{
    position:relative;
    width:100%;
    margin-top:10px;
}
.mapWrap img{
    width:100%;
    max-height:none!important;
    display:block;
}

#game{position:relative;width:95vw;max-width:1400px;aspect-ratio:768/512;background:#000;}
#room{width:100%;height:100%;display:block;object-fit:contain;pointer-events:none;}
.book{left:22%;top:35%;width:11%;height:10%;}
.crystal{left:45%;top:51%;width:12%;height:13%;}
.window{left:39%;top:10%;width:17%;height:24%;}
.bed{left:7%;top:53%;width:22%;height:25%;}
.closet{left:68%;top:18%;width:20%;height:34%;}
.chest{left:82%;top:72%;width:13%;height:14%;}
#dialogueWrap{height:24%;}
#dialogueText{color:#2b1607;transform:translateY(8px);}
.villageHotspot{position:absolute;left:7%;top:68%;width:28%;height:24%;background:transparent;border:none;cursor:pointer;z-index:5;padding:0;margin:0;}
.mapHint{font-size:18px;margin-top:12px;color:#f8e1ad;}
</style>
</head>
<body>
<div id="game">
<img id="room" src="./images/room.webp" alt="마법사의 방">

<button class="hotspot book" onclick="openBook()"></button>
<button class="hotspot crystal" onclick="openCrystal()"></button>
<button class="hotspot window" onclick="say('창문으로 뛰어내리는 것은 하면 안되는 행동이지..')"></button>
<button class="hotspot bed" onclick="say('지금은 자면 안 돼.. 바쁘다고!')"></button>
<button class="hotspot closet" onclick="say('이 옷들은 모험에 도움이 안 되는 걸..')"></button>
<button class="hotspot chest" onclick="say('아무것도 들어있지 않다.')"></button>

<div id="dialogueWrap">
<div id="dialogueFallback"></div>
<img id="dialogueImage" src="./images/dialogue_box.webp" alt="">
<div id="dialogueText"></div>
</div>
</div>

<div id="popup"><div id="popupPanel"></div></div>

<script>
let bookSolved=false;
let hasMap=false;

let timer=null;
let typingTimer=null;

const dialogueWrap=document.getElementById("dialogueWrap");
const dialogueText=document.getElementById("dialogueText");
const popup=document.getElementById("popup");
const popupPanel=document.getElementById("popupPanel");
const dialogueImage=document.getElementById("dialogueImage");

if(dialogueImage){
    dialogueImage.onerror=function(){
        dialogueImage.style.display="none";
    };
}

function typeText(element,text,speed=28,afterDone=null){
    clearInterval(typingTimer);
    element.classList.remove("done");
    element.innerText="";
    let i=0;
    typingTimer=setInterval(function(){
        element.innerText=text.slice(0,i);
        i++;
        if(i>text.length){
            clearInterval(typingTimer);
            element.classList.add("done");
            if(afterDone){afterDone();}
        }
    },speed);
}

function say(text){
    clearTimeout(timer);
    clearInterval(typingTimer);
    dialogueWrap.style.display="flex";
    typeText(dialogueText,text,28);
    timer=setTimeout(function(){
        clearInterval(typingTimer);
        dialogueWrap.style.display="none";
    },4300);
}

function openPopup(html){
    clearTimeout(timer);
    clearInterval(typingTimer);
    if(dialogueWrap){dialogueWrap.style.display="none";}
    popupPanel.innerHTML=html;
    popup.style.display="flex";
}

function closePopup(){
    popup.style.display="none";
}

popup.addEventListener("click",function(e){
    if(e.target===popup){
        closePopup();
    }
});


function openBook(){
    openPopup(`
        <img src="./images/book_problem.webp" alt="책 문제">
        <div>
            <input id="xInput" placeholder="x">
            <input id="yInput" placeholder="y">
            <button onclick="checkBook()">제출</button>
            <button onclick="closePopup()">닫기</button>
        </div>
    `);
}

function checkBook(){
    const x=document.getElementById("xInput").value.trim();
    const y=document.getElementById("yInput").value.trim();

    if(x==="3" && y==="5"){
        bookSolved=true;
        closePopup();
        say("마법구를 해석하는 방법을 알아냈다.");
    }else{
        closePopup();
        say("아직 답이 맞지 않는 것 같다.");
    }
}

function openCrystal(){
    if(!bookSolved){
        say("수정구의 빛이 보이긴 하지만.. 해석하려면 먼저 해석하는 방법을 알아내야할 거 같다.");
        return;
    }

    openPopup(`
        <img src="./images/crystal_problem.webp" alt="수정구 문제">
        <div>
            <button onclick="checkCrystal(1)">1</button>
            <button onclick="checkCrystal(2)">2</button>
            <button onclick="checkCrystal(3)">3</button>
            <button onclick="checkCrystal(4)">4</button>
            <button onclick="checkCrystal(5)">5</button>
            <button onclick="closePopup()">닫기</button>
        </div>
    `);
}

function checkCrystal(num){
    if(num===3){
        hasMap=true;
        showMap();
    }else{
        closePopup();
        say("수정구의 빛이 흔들린다...");
    }
}

function showMap(){
    openPopup(`
        <p style="font-size:22px;font-weight:bold;margin:0 0 12px;">
            마법구를 해석해 가야할 곳을 알아냈다.<br>
            우리는 용사를 만나러 가야한다.<br>
            용사의 마을로 이동하자.
        </p>
        <div class="mapWrap">
            <img src="./images/maps.webp" alt="지도">
            <button class="villageHotspot" onclick="goNextRoom()" aria-label="용사의 마을로 이동"></button>
        </div>
        <p class="mapHint">지도 왼쪽 아래의 용사의 마을을 눌러 이동하자.</p>
        <button onclick="closePopup()">닫기</button>
    `);
}

function goNextRoom(){
    window.location.href="village.html";
}
</script>
</body>
</html>
