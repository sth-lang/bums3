<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마법사의 방</title>
<style>

*{box-sizing:border-box;}

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

#game{
    position:relative;
    width:min(100vw, calc(100vh * var(--aspect)));
    height:min(100vh, calc(100vw / var(--aspect)));
    max-width:1400px;
    max-height:100vh;
    background:#000;
    overflow:hidden;
}

.bgImg{
    width:100%;
    height:100%;
    display:block;
    object-fit:contain;
    pointer-events:none;
    user-select:none;
}

.hotspot{
    position:absolute;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:20;
    padding:0;
    margin:0;
}

/* 클릭 위치 확인할 때만 주석 해제
.hotspot{
    outline:3px solid red;
    background:rgba(255,0,0,0.15);
}
*/

#lifeUI{
    position:absolute;
    top:2.2%;
    right:2.3%;
    z-index:80;
    font-size:clamp(14px,2.2vw,24px);
    letter-spacing:2px;
    text-shadow:2px 2px 0 #000;
    user-select:none;
    pointer-events:none;
}

#dialogueWrap{
    position:absolute;
    left:50%;
    bottom:2%;
    transform:translateX(-50%);
    width:88%;
    height:20%;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:60;
    pointer-events:none;
}

#dialogueFallback{
    position:absolute;
    inset:0;
    background:rgba(20,12,5,0.9);
    border:5px double #d7a74b;
    border-radius:16px;
}

#dialogueImage{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:fill;
    z-index:1;
}

#dialogueText{
    position:relative;
    z-index:2;
    width:76%;
    text-align:center;
    font-size:clamp(13px,2vw,30px);
    font-weight:900;
    line-height:1.42;
    word-break:keep-all;
    white-space:pre-line;
}

#dialogueText::after,
.typeText::after{
    content:"";
    display:inline-block;
    width:0.55em;
    height:1em;
    margin-left:4px;
    vertical-align:-0.12em;
    background:currentColor;
    animation:blinkCursor .75s steps(1) infinite;
}

#dialogueText.done::after,
.typeText.done::after{
    display:none;
}

@keyframes blinkCursor{
    50%{opacity:0;}
}

#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#popupPanel{
    width:min(94vw,980px);
    max-height:94vh;
    overflow:auto;
    background:#1b120a;
    color:white;
    border:4px solid #8d612b;
    border-radius:16px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.85);
}

#popupPanel img{
    width:100%;
    max-height:72vh;
    object-fit:contain;
    border-radius:8px;
    margin-bottom:12px;
}

button{
    padding:10px 18px;
    margin:6px;
    font-size:18px;
    font-weight:900;
    cursor:pointer;
    border-radius:8px;
    border:2px solid #8d612b;
    background:linear-gradient(#f0c47b,#b5792c);
    color:#2b1607;
}

input{
    padding:10px;
    width:130px;
    font-size:20px;
    text-align:center;
    border-radius:8px;
    border:2px solid #8d612b;
}

.mapWrap{
    position:relative;
    width:100%;
    margin-top:10px;
}

.mapWrap img{
    width:100%;
    max-height:none!important;
    display:block;
}

@media (orientation:portrait){
    #dialogueWrap{
        width:92%;
        height:22%;
        bottom:2%;
    }

    #dialogueText{
        width:72%;
        font-size:clamp(12px,3vw,20px);
        line-height:1.32;
    }

    #lifeUI{
        font-size:clamp(14px,3.6vw,20px);
        top:2%;
        right:2%;
    }

    #popupPanel{
        width:96vw;
        padding:14px;
    }

    button{
        font-size:16px;
        padding:9px 14px;
    }
}

#game{--aspect:1.5;}
#dialogueText{color:#2b1607;transform:translateY(6px);}
.book{left:23%;top:34%;width:13%;height:13%;}
.crystal{left:47%;top:51%;width:15%;height:16%;}
.window{left:42%;top:10%;width:19%;height:25%;}
.bed{left:6%;top:53%;width:22%;height:27%;}
.closet{left:72%;top:31%;width:18%;height:27%;}
.chest{left:82%;top:74%;width:13%;height:14%;}
.villageHotspot{position:absolute;left:7%;top:68%;width:28%;height:24%;background:transparent;border:none;cursor:pointer;z-index:5;padding:0;margin:0;}
.mapHint{font-size:18px;margin-top:12px;color:#f8e1ad;}
</style>
</head>
<body>
<div id="game">
<div id="lifeUI">❤️❤️❤️</div>
<img class="bgImg" src="./images/room.webp" alt="마법사의 방">

<button class="hotspot book" onclick="openBook()" aria-label="책"></button>
<button class="hotspot crystal" onclick="openCrystal()" aria-label="수정구"></button>
<button class="hotspot window" onclick="say('창문으로 뛰어내리는 것은 하면 안되는 행동이지..')" aria-label="창문"></button>
<button class="hotspot bed" onclick="say('지금은 자면 안 돼.. 바쁘다고!')" aria-label="침대"></button>
<button class="hotspot closet" onclick="say('이 옷들은 모험에 도움이 안 되는 걸..')" aria-label="장롱"></button>
<button class="hotspot chest" onclick="say('아무것도 들어있지 않다.')" aria-label="상자"></button>

<div id="dialogueWrap">
<div id="dialogueFallback"></div>
<img id="dialogueImage" src="./images/dialogue_box.webp" alt="">
<div id="dialogueText"></div>
</div>
</div>

<div id="popup"><div id="popupPanel"></div></div>

<script>
localStorage.setItem("wrongCount", localStorage.getItem("wrongCount") || "0");
let bookSolved=false;
let hasMap=false;

const MAX_WRONG=3;
let wrongCount=Number(localStorage.getItem("wrongCount")||"0");
let timer=null;
let typingTimer=null;

const dialogueWrap=document.getElementById("dialogueWrap");
const dialogueText=document.getElementById("dialogueText");
const popup=document.getElementById("popup");
const popupPanel=document.getElementById("popupPanel");
const dialogueImage=document.getElementById("dialogueImage");
const lifeUI=document.getElementById("lifeUI");

if(dialogueImage){
    dialogueImage.onerror=function(){
        dialogueImage.style.display="none";
    };
}

function updateLives(){
    if(!lifeUI){return;}
    let remain=MAX_WRONG-wrongCount;
    if(remain<0){remain=0;}
    let hearts="";
    for(let i=0;i<MAX_WRONG;i++){
        hearts += i<remain ? "❤️" : "🤍";
    }
    lifeUI.innerText=hearts;
}

function typeText(element,text,speed=28,afterDone=null){
    clearInterval(typingTimer);
    element.classList.remove("done");
    element.innerText="";
    let i=0;
    typingTimer=setInterval(function(){
        element.innerText=text.slice(0,i);
        i++;
        if(i>text.length){
            clearInterval(typingTimer);
            element.classList.add("done");
            if(afterDone){afterDone();}
        }
    },speed);
}

function say(text){
    clearTimeout(timer);
    clearInterval(typingTimer);
    dialogueWrap.style.display="flex";
    typeText(dialogueText,text,28);
    timer=setTimeout(function(){
        clearInterval(typingTimer);
        dialogueWrap.style.display="none";
    },4300);
}

function openPopup(html){
    clearTimeout(timer);
    clearInterval(typingTimer);
    if(dialogueWrap){dialogueWrap.style.display="none";}
    popupPanel.innerHTML=html;
    popup.style.display="flex";
}

function closePopup(){
    popup.style.display="none";
}

popup.addEventListener("click",function(e){
    if(e.target===popup){
        closePopup();
    }
});

function wrongAnswer(message="틀렸다..."){
    wrongCount++;
    localStorage.setItem("wrongCount",String(wrongCount));
    updateLives();

    if(wrongCount>=MAX_WRONG){
        showFail();
    }else{
        say(message+"\\n남은 기회: "+(MAX_WRONG-wrongCount));
    }
}

function showFail(){
    openPopup(`
        <img src="./images/fail.webp" alt="실패">
        <p style="font-size:28px;font-weight:bold;line-height:1.5;">
            모든 기회를 잃었다...<br>
            다시 도전해보자.
        </p>
        <button onclick="restartAdventure()">처음부터 다시하기</button>
    `);
}

function restartAdventure(){
    localStorage.setItem("wrongCount","0");
    window.location.href="index.html";
}

updateLives();


function openBook(){
    openPopup(`
        <img src="./images/book_problem.webp" alt="책 문제">
        <div>
            <input id="xInput" placeholder="x">
            <input id="yInput" placeholder="y">
            <button onclick="checkBook()">제출</button>
            <button onclick="closePopup()">닫기</button>
        </div>
    `);
}

function checkBook(){
    const x=document.getElementById("xInput").value.trim();
    const y=document.getElementById("yInput").value.trim();

    if(x==="3" && y==="5"){
        bookSolved=true;
        closePopup();
        say("마법구를 해석하는 방법을 알아냈다.");
    }else{
        closePopup();
        wrongAnswer("아직 답이 맞지 않는 것 같다.");
    }
}

function openCrystal(){
    if(!bookSolved){
        say("수정구의 빛이 보이긴 하지만.. 해석하려면 먼저 해석하는 방법을 알아내야할 거 같다.");
        return;
    }

    openPopup(`
        <img src="./images/crystal_problem.webp" alt="수정구 문제">
        <div>
            <button onclick="checkCrystal(1)">1</button>
            <button onclick="checkCrystal(2)">2</button>
            <button onclick="checkCrystal(3)">3</button>
            <button onclick="checkCrystal(4)">4</button>
            <button onclick="checkCrystal(5)">5</button>
            <button onclick="closePopup()">닫기</button>
        </div>
    `);
}

function checkCrystal(num){
    if(num===3){
        hasMap=true;
        showMap();
    }else{
        closePopup();
        wrongAnswer("수정구의 빛이 흔들린다...");
    }
}

function showMap(){
    openPopup(`
        <p style="font-size:22px;font-weight:bold;margin:0 0 12px;">
            마법구를 해석해 가야할 곳을 알아냈다.<br>
            우리는 용사를 만나러 가야한다.<br>
            용사의 마을로 이동하자.
        </p>
        <div class="mapWrap">
            <img src="./images/maps.webp" alt="지도">
            <button class="villageHotspot" onclick="goNextRoom()" aria-label="용사의 마을로 이동"></button>
        </div>
        <p class="mapHint">지도 왼쪽 아래의 용사의 마을을 눌러 이동하자.</p>
        <button onclick="closePopup()">닫기</button>
    `);
}

function goNextRoom(){
    window.location.href="village.html";
}
</script>
</body>
</html>
