<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>용사의 마을</title>
<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:sans-serif;
}

#game{
    position:relative;
    width:95vw;
    max-width:1400px;
    aspect-ratio:1365/1024;
}

#village{
    width:100%;
    height:100%;
    display:block;
    object-fit:contain;
}

.hotspot{
    position:absolute;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:20;
}

/* 위치 확인할 때만 주석 해제
.hotspot{
    outline:3px solid red;
    background:rgba(255,0,0,0.15);
}
*/

/* 클릭 영역 */
.hero{
    left:47%;
    top:67%;
    width:7%;
    height:12%;
}

.fountain{
    left:35%;
    top:36%;
    width:29%;
    height:28%;
}

.shop{
    left:69%;
    top:16%;
    width:25%;
    height:30%;
}

.inn{
    left:3%;
    top:20%;
    width:25%;
    height:30%;
}

.rightHouse{
    left:72%;
    top:51%;
    width:26%;
    height:33%;
}

.leftHouse{
    left:0%;
    top:54%;
    width:24%;
    height:30%;
}

/* 대사창 */
#dialogueWrap{
    position:absolute;
    left:50%;
    bottom:2%;
    transform:translateX(-50%);
    width:88%;
    height:18%;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:50;
}

#dialogueBox{
    position:absolute;
    inset:0;
    background:rgba(20,12,5,0.9);
    border:5px double #d7a74b;
    border-radius:16px;
    box-shadow:0 0 20px rgba(0,0,0,0.9);
}

#dialogueText{
    position:relative;
    z-index:2;
    width:82%;
    text-align:center;
    color:#ffe6a8;
    font-size:clamp(18px,2vw,30px);
    font-weight:bold;
    line-height:1.45;
    word-break:keep-all;
}

/* 잠자는 연출 */
#sleepOverlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.65);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:80;
    color:white;
    font-size:clamp(48px,8vw,110px);
    font-weight:bold;
    letter-spacing:8px;
}

/* 팝업 */
#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#popupPanel{
    width:min(92vw,800px);
    max-height:92vh;
    overflow:auto;
    background:#1b120a;
    color:white;
    border:4px solid #8d612b;
    border-radius:16px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.85);
}

#popupPanel img{
    width:100%;
    max-height:68vh;
    object-fit:contain;
    border-radius:8px;
    margin-bottom:12px;
}

button{
    padding:10px 18px;
    margin:6px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
    border:2px solid #8d612b;
    background:#f0c47b;
    color:#2b1607;
}

input{
    padding:10px;
    width:120px;
    font-size:20px;
    text-align:center;
    border-radius:8px;
    border:2px solid #8d612b;
}

.mapWrap{
    position:relative;
    width:100%;
    margin-top:10px;
}

.mapWrap img{
    width:100%;
    display:block;
}

/* maps.webp 기준 오른쪽 위 마왕성 */
.castleHotspot{
    position:absolute;
    left:64%;
    top:8%;
    width:28%;
    height:34%;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:5;
    padding:0;
    margin:0;
}

/* 지도 클릭 위치 확인할 때만 주석 해제
.castleHotspot{
    outline:3px solid red;
    background:rgba(255,0,0,0.15);
}
*/
</style>
</head>

<body>

<div id="game">
    <img id="village" src="./images/village.webp" alt="용사의 마을">

    <button class="hotspot hero" onclick="say('이 사람이 나와 함께 모험을 떠날 용사인가보다. 잘 보여야하나?')"></button>
    <button class="hotspot fountain" onclick="openFountain()"></button>
    <button class="hotspot shop" onclick="openShop()"></button>
    <button class="hotspot inn" onclick="sleepAtInn()"></button>
    <button class="hotspot rightHouse" onclick="say('여긴 그냥 일반 집인가봐. 들어가지 말자.')"></button>
    <button class="hotspot leftHouse" onclick="say('여긴 그냥 일반 집인가봐. 들어가지 말자.')"></button>

    <div id="dialogueWrap">
        <div id="dialogueBox"></div>
        <div id="dialogueText"></div>
    </div>

    <div id="sleepOverlay">Zzz..</div>
</div>

<div id="popup">
    <div id="popupPanel"></div>
</div>

<script>
let fountainSolved = false;
let shopSolved = false;
let timer = null;

const dialogueWrap = document.getElementById("dialogueWrap");
const dialogueText = document.getElementById("dialogueText");
const popup = document.getElementById("popup");
const popupPanel = document.getElementById("popupPanel");
const sleepOverlay = document.getElementById("sleepOverlay");

function say(text){
    clearTimeout(timer);
    dialogueText.innerText = text;
    dialogueWrap.style.display = "flex";

    timer = setTimeout(function(){
        dialogueWrap.style.display = "none";
    }, 3000);
}

function openPopup(html){
    clearTimeout(timer);
    dialogueWrap.style.display = "none";
    popupPanel.innerHTML = html;
    popup.style.display = "flex";
}

function closePopup(){
    popup.style.display = "none";
}

popup.addEventListener("click", function(e){
    if(e.target === popup){
        closePopup();
    }
});

function openFountain(){
    openPopup(`
        <img src="./images/water.webp" alt="분수 문제">
        <div>
            <input id="waterAnswer" placeholder="정답">
            <button onclick="checkFountain()">제출</button>
            <button onclick="closePopup()">닫기</button>
        </div>
    `);
}

function checkFountain(){
    const answer = document.getElementById("waterAnswer").value.trim();

    if(answer === "27"){
        fountainSolved = true;
        closePopup();
        say("분수의 비밀을 알아냈다.");
    }else{
        closePopup();
        say("분수의 물소리만 들린다... 다시 생각해보자.");
    }
}

function openShop(){
    if(!fountainSolved){
        say("상점에 들어가려면 먼저 마을 중앙의 분수에 숨겨진 단서를 풀어야할 것 같다.");
        return;
    }

    openPopup(`
        <img src="./images/shop.webp" alt="상점 문제">
        <p style="font-size:20px; font-weight:bold;">정답을 고르시오.</p>
        <div>
            <button onclick="toggleChoice('ㄱ')" id="choiceㄱ">ㄱ</button>
            <button onclick="toggleChoice('ㄴ')" id="choiceㄴ">ㄴ</button>
            <button onclick="toggleChoice('ㄷ')" id="choiceㄷ">ㄷ</button>
            <button onclick="toggleChoice('ㄹ')" id="choiceㄹ">ㄹ</button>
            <button onclick="toggleChoice('ㅁ')" id="choiceㅁ">ㅁ</button>
        </div>
        <div>
            <button onclick="checkShop()">제출</button>
            <button onclick="closePopup()">닫기</button>
        </div>
    `);

    selectedChoices = [];
}

let selectedChoices = [];

function toggleChoice(choice){
    const index = selectedChoices.indexOf(choice);

    if(index >= 0){
        selectedChoices.splice(index, 1);
        document.getElementById("choice" + choice).style.filter = "none";
    }else{
        selectedChoices.push(choice);
        document.getElementById("choice" + choice).style.filter = "brightness(1.35)";
    }
}

function checkShop(){
    const sorted = selectedChoices.slice().sort().join(",");

    if(sorted === "ㄱ,ㅁ"){
        shopSolved = true;
        showMap();
    }else{
        closePopup();
        say("상점 주인이 고개를 젓는다. 다시 생각해보자.");
    }
}

function showMap(){
    openPopup(`
        <p style="font-size:22px; font-weight:bold; margin:0 0 12px;">
            포션과 무기, 갑옷을 얻었다!<br>
            이제 마왕성으로 향하자.
        </p>
        <div class="mapWrap">
            <img src="./images/maps.webp" alt="지도">
            <button class="castleHotspot" onclick="goCastle()" aria-label="마왕성으로 이동"></button>
        </div>
        <p style="font-size:18px; color:#f8e1ad;">지도에서 마왕성을 눌러 이동하자.</p>
        <button onclick="closePopup()">닫기</button>
    `);
}

function goCastle(){
    window.location.href = "castle.html";
}

function sleepAtInn(){
    say("하루 푹 쉬어볼까?");

    setTimeout(function(){
        dialogueWrap.style.display = "none";
        sleepOverlay.style.display = "flex";
    }, 900);

    setTimeout(function(){
        sleepOverlay.style.display = "none";
    }, 3000);
}
</script>

</body>
</html>
