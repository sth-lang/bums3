<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>용사의 마을</title>
<style>

*{box-sizing:border-box;}
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:sans-serif;
}
.hotspot{
    position:absolute;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:20;
    padding:0;
    margin:0;
}
/*
.hotspot{
    outline:3px solid red;
    background:rgba(255,0,0,0.15);
}
*/
button{
    padding:10px 18px;
    margin:6px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
    border:2px solid #8d612b;
    background:#f0c47b;
    color:#2b1607;
}
input{
    padding:10px;
    width:130px;
    font-size:20px;
    text-align:center;
    border-radius:8px;
    border:2px solid #8d612b;
}
#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}
#popupPanel{
    width:min(94vw,920px);
    max-height:94vh;
    overflow:auto;
    background:#1b120a;
    color:white;
    border:4px solid #8d612b;
    border-radius:16px;
    padding:22px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.85);
}
#popupPanel img{
    width:100%;
    max-height:72vh;
    object-fit:contain;
    border-radius:8px;
    margin-bottom:12px;
}
#dialogueWrap{
    position:absolute;
    left:50%;
    bottom:2%;
    transform:translateX(-50%);
    width:88%;
    height:20%;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:60;
    pointer-events:none;
}
#dialogueFallback{
    position:absolute;
    inset:0;
    background:rgba(20,12,5,0.9);
    border:5px double #d7a74b;
    border-radius:16px;
}
#dialogueImage{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:fill;
    z-index:1;
}
#dialogueText{
    position:relative;
    z-index:2;
    width:78%;
    text-align:center;
    font-size:clamp(18px,2vw,30px);
    font-weight:bold;
    line-height:1.45;
    word-break:keep-all;
    white-space:pre-line;
}
#dialogueText::after,
.typeText::after{
    content:"";
    display:inline-block;
    width:0.55em;
    height:1em;
    margin-left:4px;
    vertical-align:-0.12em;
    background:currentColor;
    animation:blinkCursor 0.75s steps(1) infinite;
}
#dialogueText.done::after,
.typeText.done::after{
    display:none;
}
@keyframes blinkCursor{
    50%{opacity:0;}
}
.mapWrap{
    position:relative;
    width:100%;
    margin-top:10px;
}
.mapWrap img{
    width:100%;
    max-height:none!important;
    display:block;
}

#game{position:relative;width:95vw;max-width:1400px;aspect-ratio:1365/1024;background:#000;}
#village{width:100%;height:100%;display:block;object-fit:contain;pointer-events:none;}
.hero{left:47%;top:67%;width:7%;height:12%;}
.fountain{left:43%;top:40%;width:17%;height:22%;}
.shop{left:69%;top:16%;width:25%;height:30%;}
.inn{left:3%;top:20%;width:25%;height:30%;}
.rightHouse{left:72%;top:51%;width:26%;height:33%;}
.leftHouse{left:0%;top:54%;width:24%;height:30%;}
#dialogueText{color:#2b1607;transform:translateY(6px);}
#sleepOverlay{position:absolute;inset:0;background:rgba(0,0,0,0.65);display:none;justify-content:center;align-items:center;z-index:80;color:white;font-size:clamp(48px,8vw,110px);font-weight:bold;letter-spacing:8px;}
.castleHotspot{position:absolute;left:64%;top:8%;width:28%;height:34%;background:transparent;border:none;cursor:pointer;z-index:5;padding:0;margin:0;}
</style>
</head>
<body>
<div id="game">
<img id="village" src="./images/village.webp" alt="용사의 마을">

<button class="hotspot hero" onclick="say('이 사람이 나와 함께 모험을 떠날 용사인가보다. 잘 보여야하나?')"></button>
<button class="hotspot fountain" onclick="openFountain()"></button>
<button class="hotspot shop" onclick="openShop()"></button>
<button class="hotspot inn" onclick="sleepAtInn()"></button>
<button class="hotspot rightHouse" onclick="say('여긴 그냥 일반 집인가봐. 들어가지 말자.')"></button>
<button class="hotspot leftHouse" onclick="say('여긴 그냥 일반 집인가봐. 들어가지 말자.')"></button>

<div id="dialogueWrap">
<div id="dialogueFallback"></div>
<img id="dialogueImage" src="./images/vi_dia.webp" alt="">
<div id="dialogueText"></div>
</div>

<div id="sleepOverlay">Zzz..</div>
</div>

<div id="popup"><div id="popupPanel"></div></div>

<script>
let fountainSolved=false;
let shopSolved=false;
let selectedChoices=[];
const sleepOverlay=document.getElementById("sleepOverlay");

let timer=null;
let typingTimer=null;

const dialogueWrap=document.getElementById("dialogueWrap");
const dialogueText=document.getElementById("dialogueText");
const popup=document.getElementById("popup");
const popupPanel=document.getElementById("popupPanel");
const dialogueImage=document.getElementById("dialogueImage");

if(dialogueImage){
    dialogueImage.onerror=function(){
        dialogueImage.style.display="none";
    };
}

function typeText(element,text,speed=28,afterDone=null){
    clearInterval(typingTimer);
    element.classList.remove("done");
    element.innerText="";
    let i=0;
    typingTimer=setInterval(function(){
        element.innerText=text.slice(0,i);
        i++;
        if(i>text.length){
            clearInterval(typingTimer);
            element.classList.add("done");
            if(afterDone){afterDone();}
        }
    },speed);
}

function say(text){
    clearTimeout(timer);
    clearInterval(typingTimer);
    dialogueWrap.style.display="flex";
    typeText(dialogueText,text,28);
    timer=setTimeout(function(){
        clearInterval(typingTimer);
        dialogueWrap.style.display="none";
    },4300);
}

function openPopup(html){
    clearTimeout(timer);
    clearInterval(typingTimer);
    if(dialogueWrap){dialogueWrap.style.display="none";}
    popupPanel.innerHTML=html;
    popup.style.display="flex";
}

function closePopup(){
    popup.style.display="none";
}

popup.addEventListener("click",function(e){
    if(e.target===popup){
        closePopup();
    }
});


function openFountain(){
    openPopup(`
        <img src="./images/water.webp" alt="분수 문제">
        <div>
            <input id="waterAnswer" placeholder="정답">
            <button onclick="checkFountain()">제출</button>
            <button onclick="closePopup()">닫기</button>
        </div>
    `);
}

function checkFountain(){
    const answer=document.getElementById("waterAnswer").value.trim();

    if(answer==="27"){
        fountainSolved=true;
        closePopup();
        say("분수의 비밀을 알아냈다.\n분수에서 갑자기 돈이 쏟아진다!");
    }else{
        closePopup();
        say("분수의 물소리만 들린다... 다시 생각해보자.");
    }
}

function openShop(){
    if(!fountainSolved){
        say("상점에 들어가려면 먼저 분수의 비밀을 풀어야할 것 같다.");
        return;
    }

    selectedChoices=[];
    openPopup(`
        <img src="./images/shop.webp" alt="상점 문제">
        <p style="font-size:20px;font-weight:bold;">정답을 고르시오.</p>
        <div>
            <button onclick="toggleChoice('가')" id="choice가">가</button>
            <button onclick="toggleChoice('나')" id="choice나">나</button>
            <button onclick="toggleChoice('다')" id="choice다">다</button>
            <button onclick="toggleChoice('라')" id="choice라">라</button>
            <button onclick="toggleChoice('마')" id="choice마">마</button>
        </div>
        <div>
            <button onclick="checkShop()">제출</button>
            <button onclick="closePopup()">닫기</button>
        </div>
    `);
}

function toggleChoice(choice){
    const index=selectedChoices.indexOf(choice);

    if(index>=0){
        selectedChoices.splice(index,1);
        document.getElementById("choice"+choice).style.filter="none";
    }else{
        selectedChoices.push(choice);
        document.getElementById("choice"+choice).style.filter="brightness(1.35)";
    }
}

function checkShop(){
    const sorted=selectedChoices.slice().sort().join(",");

    if(sorted==="가,마"){
        shopSolved=true;
        showMap();
    }else{
        closePopup();
        say("상점 주인이 고개를 젓는다. 다시 생각해보자.");
    }
}

function showMap(){
    openPopup(`
        <p style="font-size:22px;font-weight:bold;">
            포션과 무기, 갑옷을 얻었다!<br>
            이제 마왕성으로 향하자.
        </p>
        <div class="mapWrap">
            <img src="./images/maps.webp" alt="지도">
            <button class="castleHotspot" onclick="goCastle()" aria-label="마왕성으로 이동"></button>
        </div>
        <p style="font-size:18px;color:#f8e1ad;">지도에서 마왕성을 눌러 이동하자.</p>
        <button onclick="closePopup()">닫기</button>
    `);
}

function goCastle(){
    window.location.href="devil_start.html";
}

function sleepAtInn(){
    say("하루 푹 쉬어볼까?");
    setTimeout(function(){
        dialogueWrap.style.display="none";
        sleepOverlay.style.display="flex";
    },900);
    setTimeout(function(){
        sleepOverlay.style.display="none";
    },3000);
}
</script>
</body>
</html>
