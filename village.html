<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>용사의 마을</title>
<style>

*{box-sizing:border-box;}

html,body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
    background:#000;
    font-family:sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

#game{
    position:relative;
    width:min(96vw, 1400px);
    background:#000;
    overflow:hidden;
}

.bgImg{
    width:100%;
    height:100%;
    display:block;
    object-fit:contain;
    pointer-events:none;
    user-select:none;
}

.hotspot{
    position:absolute;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:20;
    padding:0;
    margin:0;
}

/* 클릭 위치 확인용
.hotspot{
    outline:3px solid red;
    background:rgba(255,0,0,0.15);
}
*/

#lifeUI{
    position:absolute;
    top:2.5%;
    right:2.5%;
    z-index:999;
    font-size:clamp(15px,2.4vw,26px);
    letter-spacing:2px;
    text-shadow:2px 2px 0 #000;
    user-select:none;
    pointer-events:none;
}

#dialogueWrap{
    position:absolute;
    left:50%;
    bottom:2%;
    transform:translateX(-50%);
    width:88%;
    height:20%;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:60;
    pointer-events:none;
}

#dialogueFallback{
    position:absolute;
    inset:0;
    background:rgba(20,12,5,0.9);
    border:5px double #d7a74b;
    border-radius:16px;
}

#dialogueImage{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:fill;
    z-index:1;
}

#dialogueText{
    position:relative;
    z-index:2;
    width:76%;
    text-align:center;
    font-size:clamp(13px,2.2vw,30px);
    font-weight:bold;
    line-height:1.42;
    word-break:keep-all;
    white-space:pre-line;
}

#dialogueText::after,
.typeText::after{
    content:"";
    display:inline-block;
    width:0.55em;
    height:1em;
    margin-left:4px;
    vertical-align:-0.12em;
    background:currentColor;
    animation:blinkCursor 0.75s steps(1) infinite;
}

#dialogueText.done::after,
.typeText.done::after{
    display:none;
}

@keyframes blinkCursor{
    50%{opacity:0;}
}

#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#popupPanel{
    width:min(94vw,920px);
    max-height:94vh;
    overflow:auto;
    background:#1b120a;
    color:white;
    border:4px solid #8d612b;
    border-radius:16px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.85);
}

#popupPanel img{
    width:100%;
    max-height:72vh;
    object-fit:contain;
    border-radius:8px;
    margin-bottom:12px;
}

button{
    padding:10px 18px;
    margin:6px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
    border:2px solid #8d612b;
    background:#f0c47b;
    color:#2b1607;
}

input{
    padding:10px;
    width:130px;
    font-size:20px;
    text-align:center;
    border-radius:8px;
    border:2px solid #8d612b;
}

.mapWrap{
    position:relative;
    width:100%;
    margin-top:10px;
}

.mapWrap img{
    width:100%;
    max-height:none!important;
    display:block;
}

@media (orientation: portrait){
    body{
        align-items:flex-start;
        padding-top:8vh;
        overflow:auto;
    }

    #game{
        width:100vw;
        max-width:none;
    }

    #dialogueWrap{
        width:96%;
        height:22%;
        bottom:1.2%;
    }

    #dialogueText{
        width:70%;
        font-size:clamp(12px,3.3vw,20px);
        line-height:1.35;
    }

    #lifeUI{
        top:2%;
        right:2%;
        font-size:clamp(14px,4vw,22px);
    }

    #popupPanel{
        width:96vw;
        padding:14px;
    }

    button{
        font-size:16px;
        padding:9px 14px;
    }
}

#game{aspect-ratio:1365/1024;}
#dialogueText{color:#2b1607;transform:translateY(6px);}
.hero{left:47%;top:67%;width:7%;height:12%;}
.fountain{left:43%;top:40%;width:17%;height:22%;}
.shop{left:69%;top:16%;width:25%;height:30%;}
.inn{left:3%;top:20%;width:25%;height:30%;}
.rightHouse{left:72%;top:51%;width:26%;height:33%;}
.leftHouse{left:0%;top:54%;width:24%;height:30%;}
#sleepOverlay{position:absolute;inset:0;background:rgba(0,0,0,0.65);display:none;justify-content:center;align-items:center;z-index:80;color:white;font-size:clamp(48px,8vw,110px);font-weight:bold;letter-spacing:8px;}
.castleHotspot{position:absolute;left:64%;top:8%;width:28%;height:34%;background:transparent;border:none;cursor:pointer;z-index:5;padding:0;margin:0;}
</style>
</head>
<body>
<div id="game">
<div id="lifeUI">❤️❤️❤️</div>
<img id="village" class="bgImg" src="./images/village.webp" alt="용사의 마을">

<button class="hotspot hero" onclick="say('이 사람이 나와 함께 모험을 떠날 용사인가보다. 잘 보여야하나?')"></button>
<button class="hotspot fountain" onclick="openFountain()"></button>
<button class="hotspot shop" onclick="openShop()"></button>
<button class="hotspot inn" onclick="sleepAtInn()"></button>
<button class="hotspot rightHouse" onclick="say('여긴 그냥 일반 집인가봐. 들어가지 말자.')"></button>
<button class="hotspot leftHouse" onclick="say('여긴 그냥 일반 집인가봐. 들어가지 말자.')"></button>

<div id="dialogueWrap">
<div id="dialogueFallback"></div>
<img id="dialogueImage" src="./images/vi_dia.webp" alt="">
<div id="dialogueText"></div>
</div>

<div id="sleepOverlay">Zzz..</div>
</div>

<div id="popup"><div id="popupPanel"></div></div>

<script>
let fountainSolved=false;
let shopSolved=false;
let selectedChoices=[];
const sleepOverlay=document.getElementById("sleepOverlay");

const MAX_WRONG=3;
let wrongCount=Number(localStorage.getItem("wrongCount")||"0");
let timer=null;
let typingTimer=null;

const dialogueWrap=document.getElementById("dialogueWrap");
const dialogueText=document.getElementById("dialogueText");
const popup=document.getElementById("popup");
const popupPanel=document.getElementById("popupPanel");
const dialogueImage=document.getElementById("dialogueImage");
const lifeUI=document.getElementById("lifeUI");

if(dialogueImage){
    dialogueImage.onerror=function(){
        dialogueImage.style.display="none";
    };
}

function updateLives(){
    if(!lifeUI){return;}
    let remain=MAX_WRONG-wrongCount;
    if(remain<0){remain=0;}
    let hearts="";
    for(let i=0;i<MAX_WRONG;i++){
        hearts += i<remain ? "❤️" : "🤍";
    }
    lifeUI.innerText=hearts;
}

function typeText(element,text,speed=28,afterDone=null){
    clearInterval(typingTimer);
    element.classList.remove("done");
    element.innerText="";
    let i=0;
    typingTimer=setInterval(function(){
        element.innerText=text.slice(0,i);
        i++;
        if(i>text.length){
            clearInterval(typingTimer);
            element.classList.add("done");
            if(afterDone){afterDone();}
        }
    },speed);
}

function say(text){
    clearTimeout(timer);
    clearInterval(typingTimer);
    dialogueWrap.style.display="flex";
    typeText(dialogueText,text,28);
    timer=setTimeout(function(){
        clearInterval(typingTimer);
        dialogueWrap.style.display="none";
    },4300);
}

function openPopup(html){
    clearTimeout(timer);
    clearInterval(typingTimer);
    if(dialogueWrap){dialogueWrap.style.display="none";}
    popupPanel.innerHTML=html;
    popup.style.display="flex";
}

function closePopup(){
    popup.style.display="none";
}

popup.addEventListener("click",function(e){
    if(e.target===popup){
        closePopup();
    }
});

function wrongAnswer(message="틀렸다..."){
    wrongCount++;
    localStorage.setItem("wrongCount",String(wrongCount));
    updateLives();

    if(wrongCount>=MAX_WRONG){
        showFail();
    }else{
        say(message+"\n남은 기회: "+(MAX_WRONG-wrongCount));
    }
}

function showFail(){
    openPopup(`
        <img src="./images/fail.webp" alt="실패">
        <p style="font-size:28px;font-weight:bold;line-height:1.5;">
            모든 기회를 잃었다...<br>
            다시 도전해보자.
        </p>
        <button onclick="restartAdventure()">처음부터 다시하기</button>
    `);
}

function restartAdventure(){
    localStorage.setItem("wrongCount","0");
    window.location.href="index.html";
}

updateLives();


function openFountain(){
    openPopup(`
        <img src="./images/water.webp" alt="분수 문제">
        <div>
            <input id="waterAnswer" placeholder="정답">
            <button onclick="checkFountain()">제출</button>
            <button onclick="closePopup()">닫기</button>
        </div>
    `);
}

function checkFountain(){
    const answer=document.getElementById("waterAnswer").value.trim();

    if(answer==="27"){
        fountainSolved=true;
        closePopup();
        say("분수의 비밀을 알아냈다.\n분수에서 갑자기 돈이 쏟아진다!");
    }else{
        closePopup();
        wrongAnswer("분수의 물소리만 들린다... 다시 생각해보자.");
    }
}

function openShop(){
    if(!fountainSolved){
        say("상점에 들어가려면 먼저 분수의 비밀을 풀어야할 것 같다.");
        return;
    }

    selectedChoices=[];
    openPopup(`
        <img src="./images/shop.webp" alt="상점 문제">
        <p style="font-size:20px;font-weight:bold;">정답을 고르시오.</p>
        <div>
            <button onclick="toggleChoice('가')" id="choice가">가</button>
            <button onclick="toggleChoice('나')" id="choice나">나</button>
            <button onclick="toggleChoice('다')" id="choice다">다</button>
            <button onclick="toggleChoice('라')" id="choice라">라</button>
            <button onclick="toggleChoice('마')" id="choice마">마</button>
        </div>
        <div>
            <button onclick="checkShop()">제출</button>
            <button onclick="closePopup()">닫기</button>
        </div>
    `);
}

function toggleChoice(choice){
    const index=selectedChoices.indexOf(choice);

    if(index>=0){
        selectedChoices.splice(index,1);
        document.getElementById("choice"+choice).style.filter="none";
    }else{
        selectedChoices.push(choice);
        document.getElementById("choice"+choice).style.filter="brightness(1.35)";
    }
}

function checkShop(){
    const sorted=selectedChoices.slice().sort().join(",");

    if(sorted==="가,마"){
        shopSolved=true;
        showMap();
    }else{
        closePopup();
        wrongAnswer("상점 주인이 고개를 젓는다. 다시 생각해보자.");
    }
}

function showMap(){
    openPopup(`
        <p style="font-size:22px;font-weight:bold;">
            포션과 무기, 갑옷을 얻었다!<br>
            이제 마왕성으로 향하자.
        </p>
        <div class="mapWrap">
            <img src="./images/maps.webp" alt="지도">
            <button class="castleHotspot" onclick="goCastle()" aria-label="마왕성으로 이동"></button>
        </div>
        <p style="font-size:18px;color:#f8e1ad;">지도에서 마왕성을 눌러 이동하자.</p>
        <button onclick="closePopup()">닫기</button>
    `);
}

function goCastle(){
    window.location.href="devil_start.html";
}

function sleepAtInn(){
    say("하루 푹 쉬어볼까?");
    setTimeout(function(){
        dialogueWrap.style.display="none";
        sleepOverlay.style.display="flex";
    },900);
    setTimeout(function(){
        sleepOverlay.style.display="none";
    },3000);
}
</script>
</body>
</html>
