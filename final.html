<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>마왕성 내부</title>
<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:sans-serif;
}

#game{
    position:relative;
    width:95vw;
    max-width:1400px;
    aspect-ratio:1365/1024;
    background:#000;
}

#bg{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

.hotspot{
    position:absolute;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:20;
}

/* 위치 확인 필요하면 주석 해제
.hotspot{
    outline:3px solid red;
    background:rgba(255,0,0,0.15);
}
*/

.leftWindow{ left:0%; top:0%; width:18%; height:50%; }
.rightWindow{ left:84%; top:0%; width:16%; height:50%; }
.hero{ left:19%; top:57%; width:19%; height:39%; }
.wizard{ left:68%; top:58%; width:21%; height:38%; }
.king{ left:40%; top:23%; width:20%; height:35%; }

#dialogueWrap{
    position:absolute;
    left:50%;
    bottom:2%;
    transform:translateX(-50%);
    width:88%;
    height:20%;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:60;
}

#dialogueFallback{
    position:absolute;
    inset:0;
    background:rgba(20,12,5,0.9);
    border:5px double #d7a74b;
    border-radius:16px;
}

#dialogueImage{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:fill;
    z-index:1;
}

#dialogueText{
    position:relative;
    z-index:2;
    width:78%;
    text-align:center;
    color:#2b1607;
    font-size:clamp(18px,2vw,30px);
    font-weight:bold;
    line-height:1.45;
    transform:translateY(6px);
    word-break:keep-all;
}

#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#popupPanel{
    width:min(92vw,820px);
    max-height:92vh;
    overflow:auto;
    background:#1b120a;
    color:white;
    border:4px solid #8d612b;
    border-radius:16px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.85);
}

#popupPanel img{
    width:100%;
    max-height:68vh;
    object-fit:contain;
    border-radius:8px;
    margin-bottom:12px;
}

#endingOverlay{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:200;
}

#endingScene{
    position:relative;
    width:min(96vw,1365px);
    aspect-ratio:1365/1024;
    background:#000;
}

#endingScene img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

#returnBtn{
    position:absolute;
    left:50%;
    bottom:6%;
    transform:translateX(-50%);
    font-size:clamp(18px,2vw,28px);
    padding:14px 28px;
}

button{
    padding:10px 18px;
    margin:6px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
    border:2px solid #8d612b;
    background:#f0c47b;
    color:#2b1607;
}
</style>
</head>

<body>

<div id="game">
    <img id="bg" src="./images/final.png" alt="마왕성 내부">

    <button class="hotspot leftWindow" onclick="say('날은 쓸데없이 화창하기만 하다.')"></button>
    <button class="hotspot rightWindow" onclick="say('날은 쓸데없이 화창하기만 하다.')"></button>

    <button class="hotspot hero" onclick="openHeroProblem()"></button>
    <button class="hotspot wizard" onclick="openWizardProblem()"></button>
    <button class="hotspot king" onclick="openKingProblem()"></button>

    <div id="dialogueWrap">
        <div id="dialogueFallback"></div>
        <img id="dialogueImage" src="./images/de_dia.png" alt="">
        <div id="dialogueText"></div>
    </div>
</div>

<div id="popup">
    <div id="popupPanel"></div>
</div>

<div id="endingOverlay">
    <div id="endingScene">
        <img src="./images/final_die.png" alt="마왕 격파">
        <button id="returnBtn" onclick="goVillage()">마을로 돌아가자!</button>
    </div>
</div>

<script>
/*
정답은 나중에 여기 숫자만 바꾸면 됨.
*/
const HERO_ANSWER = 1;
const WIZARD_ANSWER = 2;
const KING_ANSWER = 3;

let heroSolved = false;
let wizardSolved = false;
let kingSolved = false;
let timer = null;

const dialogueWrap = document.getElementById("dialogueWrap");
const dialogueText = document.getElementById("dialogueText");
const popup = document.getElementById("popup");
const popupPanel = document.getElementById("popupPanel");
const dialogueImage = document.getElementById("dialogueImage");
const endingOverlay = document.getElementById("endingOverlay");

dialogueImage.onerror = function(){
    dialogueImage.style.display = "none";
};

function say(text){
    clearTimeout(timer);
    dialogueText.innerText = text;
    dialogueWrap.style.display = "flex";

    timer = setTimeout(function(){
        dialogueWrap.style.display = "none";
    },3000);
}

function openPopup(html){
    clearTimeout(timer);
    dialogueWrap.style.display = "none";
    popupPanel.innerHTML = html;
    popup.style.display = "flex";
}

function closePopup(){
    popup.style.display = "none";
}

popup.addEventListener("click", function(e){
    if(e.target === popup){
        closePopup();
    }
});

function choiceButtons(type){
    return `
        <div>
            <button onclick="checkAnswer('${type}',1)">1</button>
            <button onclick="checkAnswer('${type}',2)">2</button>
            <button onclick="checkAnswer('${type}',3)">3</button>
            <button onclick="checkAnswer('${type}',4)">4</button>
            <button onclick="checkAnswer('${type}',5)">5</button>
        </div>
        <button onclick="closePopup()">닫기</button>
    `;
}

function openHeroProblem(){
    openPopup(`
        <img src="./images/problem1.png" alt="용사 문제">
        ${choiceButtons('hero')}
    `);
}

function openWizardProblem(){
    openPopup(`
        <img src="./images/problem2.png" alt="마법사 문제">
        ${choiceButtons('wizard')}
    `);
}

function openKingProblem(){
    if(!heroSolved || !wizardSolved){
        say("용사와 마법사의 힘을 먼저 모아야 마왕에게 맞설 수 있을 것 같다.");
        return;
    }

    openPopup(`
        <img src="./images/problem3.png" alt="마왕 문제">
        ${choiceButtons('king')}
    `);
}

function checkAnswer(type, answer){
    if(type === "hero"){
        if(answer === HERO_ANSWER){
            heroSolved = true;
            closePopup();
            say("용사의 각오가 단단해졌다.");
        }else{
            closePopup();
            say("용사가 고개를 갸웃거린다. 다시 생각해보자.");
        }
    }

    if(type === "wizard"){
        if(answer === WIZARD_ANSWER){
            wizardSolved = true;
            closePopup();
            say("마법사의 주문이 완성되었다.");
        }else{
            closePopup();
            say("마법의 흐름이 흐트러졌다. 다시 생각해보자.");
        }
    }

    if(type === "king"){
        if(answer === KING_ANSWER){
            kingSolved = true;
            closePopup();
            showEnding();
        }else{
            closePopup();
            say("마왕이 여유롭게 웃고 있다...");
        }
    }
}

function showEnding(){
    endingOverlay.style.display = "flex";
}

function goVillage(){
    window.location.href = "village.html";
}
</script>

</body>
</html>
