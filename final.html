<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>마왕성 내부</title>
<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:sans-serif;
}

#game{
    position:relative;
    width:95vw;
    max-width:1400px;
    aspect-ratio:1365/1024;
    background:#000;
}

#bg{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    pointer-events:none;
    user-select:none;
}

.hotspot{
    position:absolute;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:20;
    padding:0;
    margin:0;
}

/* 클릭 위치 확인할 때만 주석 해제
.hotspot{
    outline:3px solid red;
    background:rgba(255,0,0,0.15);
}
*/

.leftWindow{
    left:0%;
    top:0%;
    width:18%;
    height:50%;
}

.rightWindow{
    left:84%;
    top:0%;
    width:16%;
    height:50%;
}

.hero{
    left:19%;
    top:57%;
    width:19%;
    height:39%;
}

.wizard{
    left:68%;
    top:58%;
    width:21%;
    height:38%;
}

.king{
    left:40%;
    top:23%;
    width:20%;
    height:35%;
}

/* 대사창 */
#dialogueWrap{
    position:absolute;
    left:50%;
    bottom:2%;
    transform:translateX(-50%);
    width:88%;
    height:20%;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:60;
    pointer-events:none;
}

#dialogueFallback{
    position:absolute;
    inset:0;
    background:rgba(20,12,5,0.9);
    border:5px double #d7a74b;
    border-radius:16px;
}

#dialogueImage{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:fill;
    z-index:1;
}

#dialogueText{
    position:relative;
    z-index:2;
    width:78%;
    text-align:center;
    color:#f3e8ff;
    text-shadow:
        2px 2px 0 #000,
        0 0 10px rgba(180,120,255,0.75);
    font-size:clamp(20px,2.1vw,32px);
    font-weight:bold;
    line-height:1.55;
    transform:translateY(12px);
    word-break:keep-all;
}

#dialogueText::after{
    content:"";
    display:inline-block;
    width:0.55em;
    height:1em;
    margin-left:4px;
    vertical-align:-0.12em;
    background:currentColor;
    animation:blinkCursor 0.75s steps(1) infinite;
}

#dialogueText.done::after{
    display:none;
}

@keyframes blinkCursor{
    50%{opacity:0;}
}

/* 문제 팝업 */
#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#popupPanel{
    width:min(97vw,1180px);
    max-height:96vh;
    overflow:auto;
    background:#1b120a;
    color:white;
    border:4px solid #8d612b;
    border-radius:16px;
    padding:28px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.85);
}

#popupPanel img{
    width:100%;
    max-height:82vh;
    object-fit:contain;
    border-radius:8px;
    margin-bottom:16px;
}

.problemChoices{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    margin:14px 0 10px;
}

.choiceBtn{
    width:68px;
    height:68px;
    padding:0;
    margin:4px;
    border-radius:50%;
    border:3px solid #8f5cff;
    background:linear-gradient(#2d1748,#0f071b);
    color:#f3e8ff;
    font-size:28px;
    font-weight:900;
    box-shadow:
        0 0 0 2px #12071f,
        0 0 14px rgba(170,90,255,0.75);
    text-shadow:2px 2px 0 #000;
}

.choiceBtn:hover{
    filter:brightness(1.25);
    transform:translateY(-2px);
}

.closeBtn{
    background:linear-gradient(#f0c47b,#b5792c);
}

.kingAnswerBox{
    margin:16px 0 8px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.kingInput{
    width:140px;
    padding:12px;
    font-size:24px;
    text-align:center;
    border-radius:10px;
    border:3px solid #8f5cff;
    background:#12071f;
    color:#f3e8ff;
    box-shadow:0 0 12px rgba(170,90,255,0.6);
    font-weight:900;
}

button{
    padding:10px 18px;
    margin:6px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
    border:2px solid #8d612b;
    background:#f0c47b;
    color:#2b1607;
}

/* 마왕 격파 */
#endingOverlay{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:200;
}

#endingScene{
    position:relative;
    width:min(96vw,1365px);
    aspect-ratio:1365/1024;
    background:#000;
}

#endingScene img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

#returnBtn{
    position:absolute;
    left:50%;
    bottom:6%;
    transform:translateX(-50%);
    font-size:clamp(18px,2vw,28px);
    padding:14px 28px;
}

/* 승리 화면 */
#winOverlay{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:300;
}

#winScene{
    position:relative;
    width:min(96vw,1365px);
    aspect-ratio:1365/1024;
    background:#000;
}

#winScene img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

#winDialogueWrap{
    position:absolute;
    left:50%;
    bottom:4%;
    transform:translateX(-50%);
    width:88%;
    height:20%;
    display:flex;
    justify-content:center;
    align-items:center;
}

#winDialogueFallback{
    position:absolute;
    inset:0;
    background:rgba(20,12,5,0.9);
    border:5px double #d7a74b;
    border-radius:16px;
}

#winDialogueImage{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:fill;
    z-index:1;
}

#winMessage{
    position:relative;
    z-index:2;
    width:78%;
    text-align:center;
    color:#2b1607;
    font-size:clamp(20px,2.2vw,34px);
    font-weight:900;
    line-height:1.45;
    transform:translateY(6px);
    word-break:keep-all;
}

#winMessage::after{
    content:"";
    display:inline-block;
    width:0.55em;
    height:1em;
    margin-left:4px;
    vertical-align:-0.12em;
    background:currentColor;
    animation:blinkCursor 0.75s steps(1) infinite;
}

#winMessage.done::after{
    display:none;
}

#restartBtn{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    display:none;
    z-index:5;
    font-size:clamp(18px,2vw,28px);
    padding:16px 30px;
}
</style>
</head>

<body>

<div id="game">
    <img id="bg" src="./images/final.png" alt="마왕성 내부">

    <button class="hotspot leftWindow" onclick="say('날은 쓸데없이 화창하기만 하다.')"></button>
    <button class="hotspot rightWindow" onclick="say('날은 쓸데없이 화창하기만 하다.')"></button>

    <button class="hotspot hero" onclick="openHeroProblem()"></button>
    <button class="hotspot wizard" onclick="openWizardProblem()"></button>
    <button class="hotspot king" onclick="openKingProblem()"></button>

    <div id="dialogueWrap">
        <div id="dialogueFallback"></div>
        <img id="dialogueImage" src="./images/fi_dia.png" alt="">
        <div id="dialogueText"></div>
    </div>
</div>

<div id="popup">
    <div id="popupPanel"></div>
</div>

<div id="endingOverlay">
    <div id="endingScene">
        <img src="./images/final_die.png" alt="마왕 격파">
        <button id="returnBtn" onclick="showWin()">마을로 돌아가자!</button>
    </div>
</div>

<div id="winOverlay">
    <div id="winScene">
        <img src="./images/win.png" alt="승리">
        <div id="winDialogueWrap">
            <div id="winDialogueFallback"></div>
            <img id="winDialogueImage" src="./images/vi_dia.png" alt="">
            <div id="winMessage"></div>
        </div>
        <button id="restartBtn" onclick="restartAdventure()">모험을 다시 시작하기</button>
    </div>
</div>

<script>
const HERO_ANSWER = 1;
const WIZARD_ANSWER = 2;
const KING_ANSWER = 1;

let heroSolved = false;
let wizardSolved = false;
let kingSolved = false;
let timer = null;
let typingTimer = null;

const dialogueWrap = document.getElementById("dialogueWrap");
const dialogueText = document.getElementById("dialogueText");
const popup = document.getElementById("popup");
const popupPanel = document.getElementById("popupPanel");
const dialogueImage = document.getElementById("dialogueImage");
const winDialogueImage = document.getElementById("winDialogueImage");
const endingOverlay = document.getElementById("endingOverlay");
const winOverlay = document.getElementById("winOverlay");
const winMessage = document.getElementById("winMessage");
const restartBtn = document.getElementById("restartBtn");

dialogueImage.onerror = function(){
    dialogueImage.style.display = "none";
};

winDialogueImage.onerror = function(){
    winDialogueImage.style.display = "none";
};

function say(text){
    clearTimeout(timer);
    clearInterval(typingTimer);

    dialogueText.classList.remove("done");
    dialogueText.innerText = "";
    dialogueWrap.style.display = "flex";

    let i = 0;
    typingTimer = setInterval(function(){
        dialogueText.innerText = text.slice(0, i);
        i++;

        if(i > text.length){
            clearInterval(typingTimer);
            dialogueText.classList.add("done");
        }
    }, 28);

    timer = setTimeout(function(){
        clearInterval(typingTimer);
        dialogueWrap.style.display = "none";
    },4200);
}

function openPopup(html){
    clearTimeout(timer);
    clearInterval(typingTimer);
    dialogueWrap.style.display = "none";
    popupPanel.innerHTML = html;
    popup.style.display = "flex";
}

function closePopup(){
    popup.style.display = "none";
}

popup.addEventListener("click", function(e){
    if(e.target === popup){
        closePopup();
    }
});

function choiceButtons(type){
    return `
        <div class="problemChoices">
            <button class="choiceBtn" onclick="checkAnswer('${type}',1)">1</button>
            <button class="choiceBtn" onclick="checkAnswer('${type}',2)">2</button>
            <button class="choiceBtn" onclick="checkAnswer('${type}',3)">3</button>
            <button class="choiceBtn" onclick="checkAnswer('${type}',4)">4</button>
            <button class="choiceBtn" onclick="checkAnswer('${type}',5)">5</button>
        </div>
        <button class="closeBtn" onclick="closePopup()">닫기</button>
    `;
}

function openHeroProblem(){
    openPopup(`
        <img src="./images/problem1.png" alt="용사 문제">
        ${choiceButtons('hero')}
    `);
}

function openWizardProblem(){
    openPopup(`
        <img src="./images/problem2.png" alt="마법사 문제">
        ${choiceButtons('wizard')}
    `);
}

function openKingProblem(){
    if(!heroSolved || !wizardSolved){
        say("용사와 마법사의 힘을 먼저 모아야 마왕에게 맞설 수 있을 것 같다.");
        return;
    }

    openPopup(`
        <img src="./images/problem3.png" alt="마왕 문제">
        <div class="kingAnswerBox">
            <input class="kingInput" id="kingAnswerInput" placeholder="정답">
            <button class="choiceBtn" onclick="checkKingInput()">제출</button>
        </div>
        <button class="closeBtn" onclick="closePopup()">닫기</button>
    `);
}

function checkKingInput(){
    const value = document.getElementById("kingAnswerInput").value.trim();

    if(value === String(KING_ANSWER)){
        kingSolved = true;
        closePopup();
        showEnding();
    }else{
        closePopup();
        say("마왕이 여유롭게 웃고 있다...");
    }
}

function checkAnswer(type, answer){
    if(type === "hero"){
        if(answer === HERO_ANSWER){
            heroSolved = true;
            closePopup();
            say("용사의 각오가 단단해졌다.");
        }else{
            closePopup();
            say("용사가 고개를 갸웃거린다. 다시 생각해보자.");
        }
    }

    if(type === "wizard"){
        if(answer === WIZARD_ANSWER){
            wizardSolved = true;
            closePopup();
            say("마법사의 주문이 완성되었다.");
        }else{
            closePopup();
            say("마법의 흐름이 흐트러졌다. 다시 생각해보자.");
        }
    }
}

function showEnding(){
    endingOverlay.style.display = "flex";
}

function showWin(){
    endingOverlay.style.display = "none";
    winOverlay.style.display = "flex";

    const finalText = "이차함수를 모두 해결했다.\n현실로 돌아갈 시간이다.";
    winMessage.innerText = "";
    winMessage.classList.remove("done");
    restartBtn.style.display = "none";

    let i = 0;
    const winTyping = setInterval(function(){
        winMessage.innerText = finalText.slice(0, i);
        i++;

        if(i > finalText.length){
            clearInterval(winTyping);
            winMessage.classList.add("done");
        }
    }, 35);

    setTimeout(function(){
        restartBtn.style.display = "block";
    }, 3000);
}

function restartAdventure(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
