<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마왕성 내부</title>
<style>

*{box-sizing:border-box;}

html,body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
    background:#000;
    font-family:sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

#game{
    position:relative;
    width:min(96vw, 1400px);
    background:#000;
    overflow:hidden;
}

.bgImg{
    width:100%;
    height:100%;
    display:block;
    object-fit:contain;
    pointer-events:none;
    user-select:none;
}

.hotspot{
    position:absolute;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:20;
    padding:0;
    margin:0;
}

/* 클릭 위치 확인용
.hotspot{
    outline:3px solid red;
    background:rgba(255,0,0,0.15);
}
*/

#lifeUI{
    position:absolute;
    top:2.5%;
    right:2.5%;
    z-index:999;
    font-size:clamp(15px,2.4vw,26px);
    letter-spacing:2px;
    text-shadow:2px 2px 0 #000;
    user-select:none;
    pointer-events:none;
}

#dialogueWrap{
    position:absolute;
    left:50%;
    bottom:2%;
    transform:translateX(-50%);
    width:88%;
    height:20%;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:60;
    pointer-events:none;
}

#dialogueFallback{
    position:absolute;
    inset:0;
    background:rgba(20,12,5,0.9);
    border:5px double #d7a74b;
    border-radius:16px;
}

#dialogueImage{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:fill;
    z-index:1;
}

#dialogueText{
    position:relative;
    z-index:2;
    width:76%;
    text-align:center;
    font-size:clamp(13px,2.2vw,30px);
    font-weight:bold;
    line-height:1.42;
    word-break:keep-all;
    white-space:pre-line;
}

#dialogueText::after,
.typeText::after{
    content:"";
    display:inline-block;
    width:0.55em;
    height:1em;
    margin-left:4px;
    vertical-align:-0.12em;
    background:currentColor;
    animation:blinkCursor 0.75s steps(1) infinite;
}

#dialogueText.done::after,
.typeText.done::after{
    display:none;
}

@keyframes blinkCursor{
    50%{opacity:0;}
}

#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#popupPanel{
    width:min(94vw,920px);
    max-height:94vh;
    overflow:auto;
    background:#1b120a;
    color:white;
    border:4px solid #8d612b;
    border-radius:16px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.85);
}

#popupPanel img{
    width:100%;
    max-height:72vh;
    object-fit:contain;
    border-radius:8px;
    margin-bottom:12px;
}

button{
    padding:10px 18px;
    margin:6px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
    border:2px solid #8d612b;
    background:#f0c47b;
    color:#2b1607;
}

input{
    padding:10px;
    width:130px;
    font-size:20px;
    text-align:center;
    border-radius:8px;
    border:2px solid #8d612b;
}

.mapWrap{
    position:relative;
    width:100%;
    margin-top:10px;
}

.mapWrap img{
    width:100%;
    max-height:none!important;
    display:block;
}

@media (orientation: portrait){
    body{
        align-items:flex-start;
        padding-top:8vh;
        overflow:auto;
    }

    #game{
        width:100vw;
        max-width:none;
    }

    #dialogueWrap{
        width:96%;
        height:22%;
        bottom:1.2%;
    }

    #dialogueText{
        width:70%;
        font-size:clamp(12px,3.3vw,20px);
        line-height:1.35;
    }

    #lifeUI{
        top:2%;
        right:2%;
        font-size:clamp(14px,4vw,22px);
    }

    #popupPanel{
        width:96vw;
        padding:14px;
    }

    button{
        font-size:16px;
        padding:9px 14px;
    }
}

#game{aspect-ratio:1365/1024;}
.leftWindow{left:0%;top:0%;width:18%;height:50%;}
.rightWindow{left:84%;top:0%;width:16%;height:50%;}
.hero{left:19%;top:57%;width:19%;height:39%;}
.wizard{left:68%;top:58%;width:21%;height:38%;}
.king{left:40%;top:23%;width:20%;height:35%;}
#dialogueFallback{border-color:#8f5cff;}
#dialogueText{color:#f3e8ff;text-shadow:2px 2px 0 #000,0 0 10px rgba(180,120,255,.75);transform:translateY(12px);}
#popupPanel{width:min(97vw,1180px);max-height:96vh;padding:28px;}
#popupPanel img{max-height:82vh;}
.problemChoices{display:flex;justify-content:center;align-items:center;gap:12px;flex-wrap:wrap;margin:14px 0 10px;}
.choiceBtn{width:68px;height:68px;padding:0;margin:4px;border-radius:50%;border:3px solid #8f5cff;background:linear-gradient(#2d1748,#0f071b);color:#f3e8ff;font-size:28px;font-weight:900;box-shadow:0 0 0 2px #12071f,0 0 14px rgba(170,90,255,.75);text-shadow:2px 2px 0 #000;}
.closeBtn{background:linear-gradient(#f0c47b,#b5792c);}
.kingAnswerBox{margin:16px 0 8px;display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;}
.kingInput{width:140px;padding:12px;font-size:24px;text-align:center;border-radius:10px;border:3px solid #8f5cff;background:#12071f;color:#f3e8ff;box-shadow:0 0 12px rgba(170,90,255,.6);font-weight:900;}
#endingOverlay,#winOverlay{position:fixed;inset:0;background:#000;display:none;justify-content:center;align-items:center;}
#endingOverlay{z-index:200;}
#winOverlay{z-index:300;}
#endingScene,#winScene{position:relative;width:min(96vw,1365px);aspect-ratio:1365/1024;background:#000;}
#endingScene img,#winScene img{width:100%;height:100%;object-fit:contain;display:block;}
#returnBtn{position:absolute;left:50%;bottom:6%;transform:translateX(-50%);font-size:clamp(18px,2vw,28px);padding:14px 28px;}
#winDialogueWrap{position:absolute;left:50%;bottom:4%;transform:translateX(-50%);width:88%;height:20%;display:flex;justify-content:center;align-items:center;}
#winDialogueFallback{position:absolute;inset:0;background:rgba(20,12,5,.9);border:5px double #d7a74b;border-radius:16px;}
#winDialogueImage{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;z-index:1;}
#winMessage{position:relative;z-index:2;width:78%;text-align:center;color:#2b1607;font-size:clamp(20px,2.2vw,34px);font-weight:900;line-height:1.45;transform:translateY(6px);word-break:keep-all;white-space:pre-line;}
#restartBtn{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:none;z-index:5;font-size:clamp(18px,2vw,28px);padding:16px 30px;}
</style>
</head>
<body>
<div id="game">
<div id="lifeUI">❤️❤️❤️</div>
<img id="bg" class="bgImg" src="./images/final.webp" alt="마왕성 내부">

<button class="hotspot leftWindow" onclick="say('날은 쓸데없이 화창하기만 하다.')"></button>
<button class="hotspot rightWindow" onclick="say('날은 쓸데없이 화창하기만 하다.')"></button>
<button class="hotspot hero" onclick="openHeroProblem()"></button>
<button class="hotspot wizard" onclick="openWizardProblem()"></button>
<button class="hotspot king" onclick="openKingProblem()"></button>

<div id="dialogueWrap">
<div id="dialogueFallback"></div>
<img id="dialogueImage" src="./images/fi_dia.webp" alt="">
<div id="dialogueText"></div>
</div>
</div>

<div id="popup"><div id="popupPanel"></div></div>

<div id="endingOverlay">
<div id="endingScene">
<img src="./images/final_die.webp" alt="마왕 격파">
<button id="returnBtn" onclick="showWin()">마을로 돌아가자!</button>
</div>
</div>

<div id="winOverlay">
<div id="winScene">
<img src="./images/win.webp" alt="승리">
<div id="winDialogueWrap">
<div id="winDialogueFallback"></div>
<img id="winDialogueImage" src="./images/vi_dia.webp" alt="">
<div id="winMessage" class="typeText"></div>
</div>
<button id="restartBtn" onclick="restartAdventure()">모험을 다시 시작하기</button>
</div>
</div>

<script>
const HERO_ANSWER=1;
const WIZARD_ANSWER=2;
const KING_ANSWER=1;
let heroSolved=false;
let wizardSolved=false;
let kingSolved=false;
const endingOverlay=document.getElementById("endingOverlay");
const winOverlay=document.getElementById("winOverlay");
const winMessage=document.getElementById("winMessage");
const restartBtn=document.getElementById("restartBtn");
const winDialogueImage=document.getElementById("winDialogueImage");

const MAX_WRONG=3;
let wrongCount=Number(localStorage.getItem("wrongCount")||"0");
let timer=null;
let typingTimer=null;

const dialogueWrap=document.getElementById("dialogueWrap");
const dialogueText=document.getElementById("dialogueText");
const popup=document.getElementById("popup");
const popupPanel=document.getElementById("popupPanel");
const dialogueImage=document.getElementById("dialogueImage");
const lifeUI=document.getElementById("lifeUI");

if(dialogueImage){
    dialogueImage.onerror=function(){
        dialogueImage.style.display="none";
    };
}

function updateLives(){
    if(!lifeUI){return;}
    let remain=MAX_WRONG-wrongCount;
    if(remain<0){remain=0;}
    let hearts="";
    for(let i=0;i<MAX_WRONG;i++){
        hearts += i<remain ? "❤️" : "🤍";
    }
    lifeUI.innerText=hearts;
}

function typeText(element,text,speed=28,afterDone=null){
    clearInterval(typingTimer);
    element.classList.remove("done");
    element.innerText="";
    let i=0;
    typingTimer=setInterval(function(){
        element.innerText=text.slice(0,i);
        i++;
        if(i>text.length){
            clearInterval(typingTimer);
            element.classList.add("done");
            if(afterDone){afterDone();}
        }
    },speed);
}

function say(text){
    clearTimeout(timer);
    clearInterval(typingTimer);
    dialogueWrap.style.display="flex";
    typeText(dialogueText,text,28);
    timer=setTimeout(function(){
        clearInterval(typingTimer);
        dialogueWrap.style.display="none";
    },4300);
}

function openPopup(html){
    clearTimeout(timer);
    clearInterval(typingTimer);
    if(dialogueWrap){dialogueWrap.style.display="none";}
    popupPanel.innerHTML=html;
    popup.style.display="flex";
}

function closePopup(){
    popup.style.display="none";
}

popup.addEventListener("click",function(e){
    if(e.target===popup){
        closePopup();
    }
});

function wrongAnswer(message="틀렸다..."){
    wrongCount++;
    localStorage.setItem("wrongCount",String(wrongCount));
    updateLives();

    if(wrongCount>=MAX_WRONG){
        showFail();
    }else{
        say(message+"\n남은 기회: "+(MAX_WRONG-wrongCount));
    }
}

function showFail(){
    openPopup(`
        <img src="./images/fail.webp" alt="실패">
        <p style="font-size:28px;font-weight:bold;line-height:1.5;">
            모든 기회를 잃었다...<br>
            다시 도전해보자.
        </p>
        <button onclick="restartAdventure()">처음부터 다시하기</button>
    `);
}

function restartAdventure(){
    localStorage.setItem("wrongCount","0");
    window.location.href="index.html";
}

updateLives();


if(winDialogueImage){
    winDialogueImage.onerror=function(){
        winDialogueImage.style.display="none";
    };
}

function choiceButtons(type){
    return `
        <div class="problemChoices">
            <button class="choiceBtn" onclick="checkAnswer('${type}',1)">1</button>
            <button class="choiceBtn" onclick="checkAnswer('${type}',2)">2</button>
            <button class="choiceBtn" onclick="checkAnswer('${type}',3)">3</button>
            <button class="choiceBtn" onclick="checkAnswer('${type}',4)">4</button>
            <button class="choiceBtn" onclick="checkAnswer('${type}',5)">5</button>
        </div>
        <button class="closeBtn" onclick="closePopup()">닫기</button>
    `;
}

function openHeroProblem(){
    openPopup(`
        <img src="./images/problem1.webp" alt="용사 문제">
        ${choiceButtons('hero')}
    `);
}

function openWizardProblem(){
    openPopup(`
        <img src="./images/problem2.webp" alt="마법사 문제">
        ${choiceButtons('wizard')}
    `);
}

function openKingProblem(){
    if(!heroSolved || !wizardSolved){
        say("용사와 마법사의 힘을 먼저 모아야 마왕에게 맞설 수 있을 것 같다.");
        return;
    }

    openPopup(`
        <img src="./images/problem3.webp" alt="마왕 문제">
        <div class="kingAnswerBox">
            <input class="kingInput" id="kingAnswerInput" placeholder="정답">
            <button class="choiceBtn" onclick="checkKingInput()">제출</button>
        </div>
        <button class="closeBtn" onclick="closePopup()">닫기</button>
    `);
}

function checkKingInput(){
    const value=document.getElementById("kingAnswerInput").value.trim();

    if(value===String(KING_ANSWER)){
        kingSolved=true;
        closePopup();
        showEnding();
    }else{
        closePopup();
        wrongAnswer("마왕이 여유롭게 웃고 있다...");
    }
}

function checkAnswer(type,answer){
    if(type==="hero"){
        if(answer===HERO_ANSWER){
            heroSolved=true;
            closePopup();
            say("용사의 각오가 단단해졌다.");
        }else{
            closePopup();
            wrongAnswer("용사가 고개를 갸웃거린다. 다시 생각해보자.");
        }
    }

    if(type==="wizard"){
        if(answer===WIZARD_ANSWER){
            wizardSolved=true;
            closePopup();
            say("마법사의 주문이 완성되었다.");
        }else{
            closePopup();
            wrongAnswer("마법의 흐름이 흐트러졌다. 다시 생각해보자.");
        }
    }
}

function showEnding(){
    endingOverlay.style.display="flex";
}

function showWin(){
    endingOverlay.style.display="none";
    winOverlay.style.display="flex";

    const finalText="이차함수를 모두 해결했다.\n현실로 돌아갈 시간이다.";
    winMessage.innerText="";
    restartBtn.style.display="none";
    typeText(winMessage,finalText,35);

    setTimeout(function(){
        restartBtn.style.display="block";
    },3000);
}

function restartAdventure(){
    localStorage.setItem("wrongCount","0");
    window.location.href="index.html";
}
</script>
</body>
</html>
