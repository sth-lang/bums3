<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>마왕성 입구</title>
<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:sans-serif;
}

#game{
    position:relative;
    width:95vw;
    max-width:1400px;
    aspect-ratio:1365/1024;
    background:#000;
}

#bg{
    width:100%;
    height:100%;
    display:block;
    object-fit:contain;
}

.hotspot{
    position:absolute;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:20;
}

/* 클릭 위치 확인할 때만 주석 해제
.hotspot{
    outline:3px solid red;
    background:rgba(255,0,0,0.15);
}
*/

/* 성 부분 */
.castleArea{
    left:12%;
    top:2%;
    width:76%;
    height:36%;
}

/* 악마 */
.devil{
    left:35%;
    top:35%;
    width:28%;
    height:31%;
    z-index:30;
}

/* 용사와 마법사 */
.party{
    left:33%;
    top:70%;
    width:32%;
    height:27%;
    z-index:30;
}

/* 전체 바닥/그 외 */
.otherArea{
    position:absolute;
    inset:0;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:1;
}

/* 대사창 */
#dialogueWrap{
    position:absolute;
    left:50%;
    bottom:2%;
    transform:translateX(-50%);
    width:88%;
    height:20%;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:60;
}

#dialogueFallback{
    position:absolute;
    inset:0;
    background:rgba(20,12,5,0.9);
    border:5px double #d7a74b;
    border-radius:16px;
    box-shadow:0 0 20px rgba(0,0,0,0.9);
}

#dialogueText{
    position:relative;
    z-index:2;
    width:82%;
    text-align:center;
    color:#ffe6a8;
    font-size:clamp(18px,2vw,30px);
    font-weight:bold;
    line-height:1.45;
    word-break:keep-all;
}

/* 팝업 */
#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#popupPanel{
    width:min(92vw,800px);
    max-height:92vh;
    overflow:auto;
    background:#1b120a;
    color:white;
    border:4px solid #8d612b;
    border-radius:16px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.85);
}

#popupPanel img{
    width:100%;
    max-height:68vh;
    object-fit:contain;
    border-radius:8px;
    margin-bottom:12px;
}

button{
    padding:10px 18px;
    margin:6px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
    border:2px solid #8d612b;
    background:#f0c47b;
    color:#2b1607;
}

#lifeUI{
    position:absolute;
    top:14px;
    right:18px;
    left:auto;
    z-index:999;
    font-size:24px;
    letter-spacing:2px;
    text-shadow:2px 2px 0 #000;
    user-select:none;
    pointer-events:none;
}

</style>
</head>

<body>

<div id="game">
<div id="lifeUI">❤️❤️❤️</div>
    <img id="bg" src="./images/devil_go.webp" alt="마왕성 입구">

    <button class="otherArea" onclick="say('돌아가는 건 안 돼. 앞으로 나아가자.')"></button>

    <button class="hotspot castleArea" onclick="say('위압감이 느껴진다. 이 성 안에 들어가야한다니...')"></button>
    <button class="hotspot devil" onclick="openDevilProblem()"></button>
    <button class="hotspot party" onclick="say('우리가 해낼 수 있을까?')"></button>

    <div id="dialogueWrap">
        <div id="dialogueFallback"></div>
        <img id="dialogueImage" src="./images/de_dia.webp" alt="">
        <div id="dialogueText"></div>
    </div>
</div>

<div id="popup">
    <div id="popupPanel"></div>
</div>

<script>

let wrongCount = 0;
const MAX_WRONG = 3;


function updateLives(){
    const lifeUI = document.getElementById("lifeUI");
    if(!lifeUI){ return; }

    const remain = MAX_WRONG - wrongCount;
    let hearts = "";

    for(let i = 0; i < MAX_WRONG; i++){
        if(i < remain){
            hearts += "❤️";
        }else{
            hearts += "🤍";
        }
    }

    lifeUI.innerText = hearts;
}

function wrongAnswer(message = "틀렸다..."){
    wrongCount++;

    updateLives();

    if(wrongCount >= MAX_WRONG){
        showFail();
    }else{
        say(message + "\n남은 기회: " + (MAX_WRONG - wrongCount));
    }
}

function showFail(){
    openPopup(`
        <img src="./images/fail.webp" alt="실패">
        <p style="
            font-size:28px;
            font-weight:bold;
            line-height:1.5;
        ">
            모든 기회를 잃었다...<br>
            다시 도전해보자.
        </p>

        <button onclick="restartAdventure()">
            처음부터 다시하기
        </button>
    `);
}

function restartAdventure(){
    window.location.href = "index.html";
}

let timer = null;

const dialogueWrap = document.getElementById("dialogueWrap");
const dialogueText = document.getElementById("dialogueText");
const popup = document.getElementById("popup");
const popupPanel = document.getElementById("popupPanel");

function say(text){
    clearTimeout(timer);
    dialogueText.innerText = text;
    dialogueWrap.style.display = "flex";

    timer = setTimeout(function(){
        dialogueWrap.style.display = "none";
    },3000);
}

function openPopup(html){
    clearTimeout(timer);
    dialogueWrap.style.display = "none";
    popupPanel.innerHTML = html;
    popup.style.display = "flex";
}

function closePopup(){
    popup.style.display = "none";
}

popup.addEventListener("click", function(e){
    if(e.target === popup){
        closePopup();
    }
});

function openDevilProblem(){
    openPopup(`
        <img src="./images/devil_door.webp" alt="악마 문제">
        <div>
            <input id="devilAnswer" placeholder="정답 입력"><button onclick="checkDevil()">제출</button><button onclick="closePopup()">닫기</button>
        </div>
    `);
}

document.addEventListener("DOMContentLoaded", updateLives);

function checkDevil(){
    const answer=document.getElementById("devilAnswer").value.trim();
    if(answer==="-32"){
        closePopup();
        openPopup(`<img src="./images/devil_die.webp" alt="악마 격파">
        <p style="font-size:24px;font-weight:bold;">악마가 쓰러졌다.<br>마왕성 안으로 들어가자.</p>
        <button onclick="goFinal()">마왕성으로 들어가자!</button>`);
    }else{
        closePopup();
        wrongAnswer("악마가 비웃고 있다...");
    }
}
function goFinal(){ window.location.href="final.html"; }
</script>

</body>
</html>
